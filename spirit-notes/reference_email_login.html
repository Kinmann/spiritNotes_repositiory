<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "on-secondary-fixed-variant": "#76302e",
                  "on-secondary-container": "#fb9b95",
                  "surface-container-lowest": "#0e0e0e",
                  "secondary-container": "#76302e",
                  "primary-fixed-dim": "#e9c176",
                  "on-tertiary-container": "#3b3b3b",
                  "on-secondary": "#5a1b1a",
                  "on-surface": "#e5e2e1",
                  "tertiary-container": "#a7a5a5",
                  "on-error": "#690005",
                  "surface-dim": "#131313",
                  "tertiary-fixed-dim": "#c8c6c5",
                  "on-primary-container": "#4e3700",
                  "surface-container-highest": "#353534",
                  "surface-bright": "#393939",
                  "background": "#131313",
                  "on-primary-fixed": "#261900",
                  "surface-tint": "#e9c176",
                  "inverse-surface": "#e5e2e1",
                  "on-background": "#e5e2e1",
                  "tertiary-fixed": "#e4e2e1",
                  "primary": "#e9c176",
                  "inverse-on-surface": "#313030",
                  "error-container": "#93000a",
                  "surface-container-low": "#1c1b1b",
                  "tertiary": "#c8c6c5",
                  "primary-fixed": "#ffdea5",
                  "on-tertiary": "#303030",
                  "secondary-fixed-dim": "#ffb3ae",
                  "inverse-primary": "#775a19",
                  "secondary": "#ffb3ae",
                  "on-primary": "#412d00",
                  "on-primary-fixed-variant": "#5d4201",
                  "surface-container": "#201f1f",
                  "on-error-container": "#ffdad6",
                  "primary-container": "#c5a059",
                  "surface": "#131313",
                  "surface-container-high": "#2a2a2a",
                  "on-tertiary-fixed-variant": "#474747",
                  "surface-variant": "#353534",
                  "on-surface-variant": "#d1c5b4",
                  "secondary-fixed": "#ffdad7",
                  "error": "#ffb4ab",
                  "outline": "#9a8f80",
                  "outline-variant": "#4e4639",
                  "on-tertiary-fixed": "#1b1c1c",
                  "on-secondary-fixed": "#3d0507"
                },
                fontFamily: {
                  "headline": ["Manrope"],
                  "body": ["Inter"],
                  "label": ["Inter"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
              },
            },
          }
        </script>
    <style>
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            .glass-card {
                background: rgba(32, 31, 31, 0.6);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(78, 70, 57, 0.15);
                border-left: 1px solid rgba(78, 70, 57, 0.15);
            }
        </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
      </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 w-full">
        <button class="flex items-center justify-center text-[#e9c176] hover:opacity-80 transition-opacity active:scale-95 duration-200">
            <span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
        </button>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-12">
        <!-- Brand Identity Section -->
        <div class="mb-12 flex flex-col items-center">
            <div class="w-24 h-24 mb-6 relative">
                <img alt="Spirit Notes Gold Logo" class="w-full h-full object-contain" data-alt="Minimalist gold foil spirit bottle emblem" src="https://lh3.googleusercontent.com/aida/ADBb0ugcO_nGc0111O0_g0Mmzs6UyuQn7ck3T8ZLJArKvJugR6Wc-9UVIG4mivMF4ebOVVFe9jYDpB2O4iSIAlv_5hxN4TSdjyePn5YnZoW5Cx2AS_7lBavk1gycTxlQi_9iGYWjpDWsxPRgDZbX7_aE-Wl-hERwVDinXf0ed29OzuNuucXaAE1DxIYqqX0cvQo0crb3Bzgkj4O_uuyYySefPXQLP3y8zLh39unIGXqyuLklfqhgz8z6_jzDjLHpLA9-JFZ9yOx1bHA"/>
            </div>
            <h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface text-center">
                Sign In with Email
            </h1>
            <p class="font-body text-on-surface-variant text-sm mt-2 opacity-80">
                Continue your sensory journey.
            </p>
        </div>
        <!-- Form Section with Glassmorphism -->
        <div class="w-full max-w-md glass-card p-8 rounded-xl">
            <form class="space-y-8">
                <!-- Email Input -->
                <div class="space-y-3">
                    <label class="font-label text-[10px] uppercase tracking-[0.15rem] font-bold text-primary" for="email">
                        Email Address
                    </label>
                    <div class="relative">
                        <input class="w-full py-3 px-6 rounded-lg bg-surface-container text-on-surface placeholder:text-on-surface-variant/40 border border-outline-variant/30 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 font-body text-sm" id="email" placeholder="name@cellar.com" type="email"/>
                    </div>
                </div>
                <!-- Password Input -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="font-label text-[10px] uppercase tracking-[0.15rem] font-bold text-primary" for="password">
                            Password
                        </label>
                        <button class="text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" type="button">
                            Forgot?
                        </button>
                    </div>
                    <div class="relative">
                        <input class="w-full py-3 px-6 rounded-lg bg-surface-container text-on-surface placeholder:text-on-surface-variant/40 border border-outline-variant/30 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 font-body text-sm" id="password" placeholder="••••••••" type="password"/>
                    </div>
                </div>
                <!-- Tertiary Action -->
                <p class="text-center text-xs text-on-surface-variant font-body pt-2">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30" href="#">Create Entry</a>
                </p>
            </form>
        </div>
        <!-- Bottom Positioning for Primary Action -->
        <div class="mt-auto w-full max-w-md pt-12">
            <button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container rounded-lg flex items-center justify-center shadow-lg shadow-primary/5 active:scale-[0.98] transition-all duration-200">
                <span class="font-label text-on-primary font-extrabold uppercase tracking-widest text-sm">
                    Sign In
                </span>
            </button>
            <!-- Legal Footer -->
            <p class="mt-8 text-[10px] text-center text-on-surface-variant/40 font-body uppercase tracking-tighter max-w-[200px] mx-auto leading-relaxed">
                By entering you confirm you are of legal drinking age in your territory.
            </p>
        </div>
    </main>
    <!-- Content Separation Tonal Layer -->
    <div class="fixed inset-0 -z-10 bg-surface pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_20%,_#1c1b1b_0%,_#131313_100%)] opacity-40"></div>
    </div>
</body>
</html>
